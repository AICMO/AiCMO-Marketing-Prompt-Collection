name: Repo Improver

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: repo-improver
  cancel-in-progress: true

jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 50
          token: ${{ secrets.PAT_TOKEN }}

      - name: Generate improvement
        id: llm
        uses: aicmo/llm-call-action@33f54e4a002d7942f3bb4102e3bf0632069d7e42 # v1.1.3
        with:
          prompt_file: .github/prompts/repo-improver.md
          output_file: /tmp/llm_response.txt
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          max_turns: 40
          min_response_length: 500

      - name: Parse and commit
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          # Find first line matching a valid file path (skip any LLM preamble)
          FILEPATH=$(grep -m1 -E '^0[1-7]_[A-Za-z0-9&()/_ -]+\.md$' /tmp/llm_response.txt | tr -d '[:space:]')

          if [ -z "$FILEPATH" ]; then
            echo "::error::No valid file path found in LLM response"
            head -c 500 /tmp/llm_response.txt
            exit 1
          fi

          # Content = everything after the filepath line
          LINE_NUM=$(grep -n -m1 -E '^0[1-7]_[A-Za-z0-9&()/_ -]+\.md$' /tmp/llm_response.txt | cut -d: -f1)
          CONTENT=$(tail -n +$((LINE_NUM + 1)) /tmp/llm_response.txt)

          if [ -z "$CONTENT" ]; then
            echo "::error::No content found after filepath"
            exit 1
          fi

          mkdir -p "$(dirname "$FILEPATH")"
          echo "$CONTENT" > "$FILEPATH"

          git config user.name "evios"
          git config user.email "zhenya.iosifov@gmail.com"
          git remote set-url origin "https://x-access-token:${PAT}@github.com/AICMO/AiCMO-Marketing-Prompt-Collection.git"
          git add "$FILEPATH"
          git commit -m "${FILEPATH}"
          git pull --rebase
          git push
