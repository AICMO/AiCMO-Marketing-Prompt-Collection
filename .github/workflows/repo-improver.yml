name: Repo Improver

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: repo-improver
  cancel-in-progress: true

jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 50
          token: ${{ secrets.PAT_TOKEN }}

      - name: Generate improvement
        id: llm
        uses: aicmo/llm-call-action@v1
        with:
          prompt_file: .github/prompts/repo-improver.md
          output_file: /tmp/llm_response.txt
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          max_turns: 20
          min_response_length: 500

      - name: Parse and commit
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          # First line = path, rest = content
          FILEPATH=$(head -1 /tmp/llm_response.txt | tr -d '[:space:]')
          CONTENT=$(tail -n +2 /tmp/llm_response.txt)

          if [ -z "$FILEPATH" ] || [ -z "$CONTENT" ]; then
            echo "::error::Failed to parse LLM response"
            head -c 200 /tmp/llm_response.txt
            exit 1
          fi

          if ! echo "$FILEPATH" | grep -qE '^0[1-7]_[A-Za-z0-9&()/_ -]+\.md$'; then
            echo "::error::Path validation failed: '$FILEPATH'"
            exit 1
          fi

          mkdir -p "$(dirname "$FILEPATH")"
          echo "$CONTENT" > "$FILEPATH"

          git config user.name "evios"
          git config user.email "zhenya.iosifov@gmail.com"
          git remote set-url origin "https://x-access-token:${PAT}@github.com/AICMO/AiCMO-Marketing-Prompt-Collection.git"
          git add "$FILEPATH"
          git commit -m "${FILEPATH}"
          git pull --rebase
          git push
